<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revolutionary Links - GWU Edition</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Since Gazetta and Avenir Next are often local or licensed fonts, 
           we provide a robust CSS stack to prioritize them.
        */
        body { 
            font-family: 'Avenir Next', 'Avenir', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif; 
            background-color: #fcfcfc; 
            color: #1a1a1a; 
            -webkit-font-smoothing: antialiased;
        }

        .font-serif { 
            font-family: 'Gazetta', 'Georgia', 'Times New Roman', serif; 
        }

        /* Utility for weighted text in Avenir Next */
        .font-avenir-heavy { font-weight: 900; }
        .font-avenir-medium { font-weight: 500; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .animate-bounce-short { animation: bounce-short 0.5s ease-in-out 1; }
        .animate-pop { animation: pop 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const HelpCircleIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        );

        const StatsIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        );

        const XIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        );

        const ShareIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        );

        const CATEGORY_BANK = [
            { category: "FRESHMAN DORMS", items: ["THURSTON", "POTOMAC", "MADISON", "GUTHRIDGE"], level: 1 },
            { category: "UPPERCLASSMEN DORMS", items: ["SHENKMAN", "SOUTH", "DISTRICT", "FULBRIGHT"], level: 2 },
            { category: "SMALLER RESIDENCE HALLS", items: ["JBKO", "MUNSON", "JACQUELINE", "ASTON"], level: 3 },
            { category: "CAMPUS LANDMARKS", items: ["KOGAN", "GELMAN", "UNIVERSITY YARD", "THE TEXTILE MUSEUM"], level: 1 },
            { category: "CAMPUS PARKS", items: ["U-YARD", "RAWLINS", "SQUARE 80", "KOGAN PLAZA"], level: 2 },
            { category: "STREETS IN FOGGY BOTTOM", items: ["H STREET", "I STREET", "G STREET", "PENNSYLVANIA"], level: 2 },
            { category: "STREETS CROSSING CAMPUS", items: ["21ST", "22ND", "23RD", "24TH"], level: 1 },
            { category: "MOUNT VERNON CAMPUS BUILDINGS", items: ["VERX", "ECKLES", "PELHAM", "AMES"], level: 3 },
            { category: "PLACES TO STUDY", items: ["GELMAN", "ECKLES", "SEAS LOBBY", "USC"], level: 2 },
            { category: "CAMPUS DINING HALLS", items: ["DISTRICT", "SHENKMAN", "PELHAM", "THURSTON"], level: 1 },
            { category: "GW ACADEMIC SCHOOLS", items: ["ELLIOTT", "MILKEN", "TRACYENBERG", "SEAS"], level: 2 },
            { category: "UNDERGRADUATE SCHOOLS", items: ["CCAS", "GWSB", "CPS", "GWSPH"], level: 3 },
            { category: "ACADEMIC BUILDINGS", items: ["CORCORAN", "DUQUES", "FUNGER", "TOMPKINS"], level: 2 },
            { category: "ADMINISTRATIVE ACRONYMS", items: ["GWEB", "GWORLD", "BANNER", "DEGREE MAP"], level: 3 },
            { category: "THINGS ON A GWORLD CARD", items: ["PHOTO", "ID NUMBER", "CHIP", "NAME"], level: 2 },
            { category: "CAMPUS SERVICES", items: ["MAILROOM", "FIXIT", "SHUTTLE", "ADVISING"], level: 2 },
            { category: "GRADUATION REGALIA", items: ["TASSEL", "STOLE", "GOWN", "HOOD"], level: 1 },
            { category: "COMMENCEMENT SPOTS", items: ["THE MALL", "U-YARD", "ELLIPSE", "SMITH CENTER"], level: 2 },
            { category: "SEMESTER MILESTONES", items: ["FINALS", "MIDTERMS", "READING DAYS", "ADD/DROP"], level: 1 },
            { category: "ENGINEERING MAJORS", items: ["BIOMEDICAL", "CIVIL", "COMPUTER", "MECHANICAL"], level: 2 },
            { category: "GW PRESIDENTS", items: ["WRIGHTON", "LEBLANC", "KNAPP", "TRACHTENBERG"], level: 3 },
            { category: "FAMOUS POLITICAL ALUMNI", items: ["WARREN", "WARNER", "POWELL", "REID"], level: 3 },
            { category: "ALUMNI IN TV NEWS", items: ["TODD", "WILLIAMS", "BASH", "HUNT"], level: 4 },
            { category: "STATUES ON CAMPUS", items: ["HIPPO", "PUSHKIN", "WASHINGTON", "BIG GEORGE"], level: 2 },
            { category: "FORMER MASCOTS", items: ["COLONIAL", "GEORGE 1", "LITTLE GEORGE", "CHESTY"], level: 4 },
            { category: "OFFICIAL MASCOT FINALISTS", items: ["REVOLUTIONARIES", "BLUE FOG", "AMBASSADORS", "SENTINELS"], level: 3 },
            { category: "HISTORICAL NAMES AT GW", items: ["COLUMBIAN", "CORCORAN", "LISNER", "MARVIN"], level: 3 },
            { category: "STUDENT MEDIA", items: ["HATCHET", "WRGW", "RIVAL", "CHERRY TREE"], level: 3 },
            { category: "GW ATHLETIC TEAMS", items: ["GYMNASTICS", "VOLLEYBALL", "WATER POLO", "ROWING"], level: 3 },
            { category: "A-10 CONFERENCE RIVALS", items: ["RAMS", "SPIDERS", "BILLIKENS", "EXPLORERS"], level: 4 },
            { category: "GW BASKETBALL VENUES", items: ["SMITH CENTER", "TIN CAN", "CHINATOWN", "VERIZON"], level: 4 },
            { category: "FIGHT SONG LYRICS", items: ["HAIL", "BUFF", "BLUE", "GLORY"], level: 1 },
            { category: "STUDENT ORG TYPES", items: ["GREEK", "SERVICE", "PRE-LAW", "ACAPELLA"], level: 2 },
            { category: "CAMPUS SAFETY RESOURCES", items: ["4-RIDE", "GWPD", "E-COMM", "BLUE LIGHT"], level: 3 },
            { category: "THINGS IN A DORM ROOM", items: ["MICROWAVE", "FRIDGE", "XL TWIN", "DESK"], level: 1 },
            { category: "METRO STOPS NEARBY", items: ["FOGGY BOTTOM", "FARRAGUT WEST", "DUPONT CIRCLE", "ROSSLYN"], level: 2 },
            { category: "METRO EXITS AT FOGGY BOTTOM", items: ["ESCALATOR", "ELEVATOR", "STAIRS", "23RD STREET"], level: 4 },
            { category: "NEIGHBORING INSTITUTIONS", items: ["WORLD BANK", "IMF", "STATE DEPT", "KENNEDY CENTER"], level: 2 },
            { category: "DC UNIVERSITIES", items: ["GEORGETOWN", "HOWARD", "AMERICAN", "CATHOLIC"], level: 3 },
            { category: "MALL MONUMENTS", items: ["LINCOLN", "JEFFERSON", "WASHINGTON", "ROOSEVELT"], level: 2 },
            { category: "FOGGY BOTTOM GROCERS", items: ["WHOLE FOODS", "FOXTROT", "TRADER JOES", "SAFEWAY"], level: 2 },
            { category: "PLACES TO GET COFFEE", items: ["STARBUCKS", "PEETS", "BLUESTONE", "TATTE"], level: 1 },
            { category: "GWORLD MERCHANTS", items: ["WESTERN MARKET", "CVS", "CHIPOTLE", "LINDY'S"], level: 2 },
            { category: "FOGGY BOTTOM HOTELS", items: ["HILTON", "RITZ-CARLTON", "WATERGATE", "STATE PLAZA"], level: 4 },
            { category: "THINGS NAMED GEORGE", items: ["WASHINGTON", "MASON", "FOREMAN", "CLOONEY"], level: 4 },
            { category: "WORDS THAT FOLLOW 'GEORGE'", items: ["TOWN", "BRIDGE", "WASHINGTON", "MASON"], level: 4 },
            { category: "RHYMES WITH 'BUFF'", items: ["ROUGH", "TOUGH", "STUFF", "FLUFF"], level: 4 },
            { category: "WORDS IN 'UNIVERSITY NAME'", items: ["GEORGE", "WASHINGTON", "UNIVERSITY", "THE"], level: 4 },
            { category: "HOMOPHONES OF DC STREETS", items: ["EYE", "KAY", "ELLE", "EM"], level: 4 },
            { category: "SYNONYMS FOR 'REVOLUTIONARY'", items: ["RADICAL", "NEW", "REBEL", "EXTREME"], level: 3 },
            { category: "SOUNDS LIKE A VERN BUS", items: ["WORM", "FERN", "BURN", "TURN"], level: 4 },
            { category: "THINGS THAT ARE 'BLUE'", items: ["FOG", "JEANS", "WHALE", "CHEESE"], level: 3 },
            { category: "GW SCHOOL COLORS", items: ["BUFF", "BLUE", "NAVY", "GOLD"], level: 1 }
        ];

        const seededRandom = (seed) => {
            let m = 0x80000000;
            let a = 1103515245;
            let c = 12345;
            let state = seed ? seed : Math.floor(Math.random() * (m - 1));
            return () => {
                state = (a * state + c) % m;
                return state / (m - 1);
            };
        };

        const getTodaySeed = () => {
            const now = new Date();
            return parseInt(`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`);
        };

        const generatePuzzle = (seed) => {
            const rng = seededRandom(seed);
            const shuffledCats = [...CATEGORY_BANK].sort(() => 0.5 - rng());
            let selectedCategories = [];
            let usedItems = new Set();

            for (let cat of shuffledCats) {
                if (selectedCategories.length === 4) break;
                const hasDuplicate = cat.items.some(item => usedItems.has(item));
                if (!hasDuplicate) {
                    selectedCategories.push(cat);
                    cat.items.forEach(item => usedItems.add(item));
                }
            }

            if (selectedCategories.length < 4) selectedCategories = shuffledCats.slice(0, 4);

            let flatItems = [];
            selectedCategories.forEach(cat => {
                cat.items.forEach(item => {
                    flatItems.push({ text: item, category: cat.category, level: cat.level });
                });
            });

            for (let i = flatItems.length - 1; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                [flatItems[i], flatItems[j]] = [flatItems[j], flatItems[i]];
            }

            return { categories: selectedCategories, items: flatItems };
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-[#033C5A] bg-opacity-60 backdrop-blur-sm p-4 animate-pop">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border border-gray-100">
                        <div className="bg-[#033C5A] p-5 flex justify-between items-center">
                            <h2 className="text-xl font-black text-white tracking-widest uppercase font-serif">{title}</h2>
                            <button onClick={onClose} className="text-white opacity-80 hover:opacity-100 transition-opacity"><XIcon /></button>
                        </div>
                        <div className="p-8">{children}</div>
                    </div>
                </div>
            );
        };

        const Toast = ({ message, isVisible }) => {
            if (!isVisible) return null;
            return (
                <div className="fixed top-24 left-1/2 transform -translate-x-1/2 bg-[#1A1A1A] text-white px-8 py-3 rounded-full shadow-2xl z-50 animate-bounce-short font-bold text-sm tracking-wide">
                    {message}
                </div>
            );
        };

        const App = () => {
            const [puzzle, setPuzzle] = useState(null);
            const [selected, setSelected] = useState([]);
            const [solvedGroups, setSolvedGroups] = useState([]);
            const [mistakesRemaining, setMistakesRemaining] = useState(4);
            const [gameStatus, setGameStatus] = useState('playing'); 
            const [shake, setShake] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            const [showStats, setShowStats] = useState(false);
            const [showHelp, setShowHelp] = useState(false);
            const [stats, setStats] = useState({ played: 0, wins: 0, currentStreak: 0, maxStreak: 0, lastPlayedDate: null });

            const levelColors = { 1: 'bg-[#AA9868]', 2: 'bg-[#3C8FC9]', 3: 'bg-[#033C5A]', 4: 'bg-purple-800' };

            useEffect(() => {
                const seed = getTodaySeed();
                const savedState = JSON.parse(localStorage.getItem('gwConnectionsState'));
                const savedStats = JSON.parse(localStorage.getItem('gwConnectionsStats')) || { played: 0, wins: 0, currentStreak: 0, maxStreak: 0, lastPlayedDate: null };
                
                setStats(savedStats);

                if (savedState && savedState.seed === seed) {
                    setPuzzle(savedState.puzzle);
                    setSolvedGroups(savedState.solvedGroups);
                    setMistakesRemaining(savedState.mistakesRemaining);
                    setGameStatus(savedState.gameStatus);
                } else {
                    setPuzzle(generatePuzzle(seed));
                    setSolvedGroups([]);
                    setMistakesRemaining(4);
                    setGameStatus('playing');
                }
            }, []);

            useEffect(() => {
                if (!puzzle) return;
                const seed = getTodaySeed();
                localStorage.setItem('gwConnectionsState', JSON.stringify({ seed, puzzle, solvedGroups, mistakesRemaining, gameStatus }));
            }, [solvedGroups, mistakesRemaining, gameStatus, puzzle]);

            const handleTileClick = (item) => {
                if (gameStatus !== 'playing') return;
                if (selected.find(s => s.text === item.text)) {
                    setSelected(selected.filter(s => s.text !== item.text));
                } else if (selected.length < 4) {
                    setSelected([...selected, item]);
                }
            };

            const handleSubmit = () => {
                if (selected.length !== 4) return;
                const category = selected[0].category;
                const isCorrect = selected.every(s => s.category === category);

                if (isCorrect) {
                    const catData = puzzle.categories.find(c => c.category === category);
                    const newSolved = [...solvedGroups, catData];
                    setSolvedGroups(newSolved);
                    setSelected([]);
                    if (newSolved.length === 4) handleWin();
                } else {
                    const counts = {};
                    selected.forEach(s => counts[s.category] = (counts[s.category] || 0) + 1);
                    const oneAway = Object.values(counts).some(c => c === 3);
                    
                    if (oneAway) showToast("One away!");
                    else {
                        showToast("Incorrect");
                        setShake(true);
                        setTimeout(() => setShake(false), 500);
                    }

                    const nextMistakes = mistakesRemaining - 1;
                    setMistakesRemaining(nextMistakes);
                    if (nextMistakes === 0) handleLoss();
                }
            };

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 2000); };

            const handleWin = () => {
                setGameStatus('won');
                updateStats(true);
                setTimeout(() => setShowStats(true), 1500);
            };

            const handleLoss = () => {
                setGameStatus('lost');
                updateStats(false);
                setTimeout(() => setShowStats(true), 1500);
            };

            const updateStats = (isWin) => {
                const today = new Date().toDateString();
                if (stats.lastPlayedDate === today) return;

                const newStats = { ...stats, played: stats.played + 1, lastPlayedDate: today };
                if (isWin) {
                    newStats.wins += 1;
                    newStats.currentStreak += 1;
                    newStats.maxStreak = Math.max(newStats.currentStreak, newStats.maxStreak);
                } else {
                    newStats.currentStreak = 0;
                }
                setStats(newStats);
                localStorage.setItem('gwConnectionsStats', JSON.stringify(newStats));
            };

            const handleShare = () => {
                const text = `Revolutionary Links #${getTodaySeed() % 1000}\n${gameStatus === 'won' ? 'Victory! 🦛' : 'Nice try!'}\nStreak: ${stats.currentStreak}`;
                navigator.clipboard.writeText(text);
                showToast("Results copied!");
            };

            if (!puzzle) return null;

            const remainingItems = puzzle.items.filter(item => !solvedGroups.some(g => g.category === item.category));

            return (
                <div className="min-h-screen flex flex-col items-center p-4">
                    <Toast message={toastMsg} isVisible={!!toastMsg} />
                    
                    <header className="w-full max-w-xl flex justify-between items-center py-6 mb-8 border-b border-gray-100">
                        <button onClick={() => setShowHelp(true)} className="p-2 hover:bg-gray-100 rounded-full"><HelpCircleIcon /></button>
                        <h1 className="text-xl md:text-4xl font-serif font-black text-[#033C5A] tracking-tighter text-center">REVOLUTIONARY LINKS</h1>
                        <button onClick={() => setShowStats(true)} className="p-2 hover:bg-gray-100 rounded-full"><StatsIcon /></button>
                    </header>

                    <main className="w-full max-w-xl">
                        <div className="text-center mb-6">
                            <p className="text-xs font-black text-gray-300 uppercase tracking-widest mb-1">Foggy Bottom Edition</p>
                            <p className="text-sm font-medium text-gray-500">Create four groups of four!</p>
                        </div>

                        <div className="space-y-2 mb-4">
                            {solvedGroups.map((group, i) => (
                                <div key={i} className={`${levelColors[group.level]} w-full py-5 rounded-xl flex flex-col items-center text-white animate-pop shadow-md border-b-4 border-black border-opacity-10`}>
                                    <h3 className="font-black uppercase tracking-widest text-sm sm:text-base">{group.category}</h3>
                                    <p className="text-[10px] sm:text-xs font-bold opacity-80 mt-1">{group.items.join(', ')}</p>
                                </div>
                            ))}
                        </div>

                        {gameStatus !== 'won' && (
                            <div className={`grid grid-cols-4 gap-2 sm:gap-3 mb-10 ${shake ? 'animate-shake' : ''}`}>
                                {remainingItems.map((item, i) => {
                                    const isSelected = selected.find(s => s.text === item.text);
                                    return (
                                        <button 
                                            key={i} 
                                            onClick={() => handleTileClick(item)}
                                            className={`aspect-[4/3] rounded-xl font-black text-[9px] sm:text-[11px] md:text-xs p-2 flex items-center justify-center uppercase transition-all duration-75 shadow-sm border-b-4 ${isSelected ? 'bg-[#033C5A] text-white border-blue-900 translate-y-0.5' : 'bg-[#efefef] text-[#033C5A] border-gray-300 hover:bg-gray-200 active:translate-y-1'}`}
                                        >
                                            {item.text}
                                        </button>
                                    );
                                })}
                            </div>
                        )}

                        {gameStatus === 'lost' && (
                            <div className="space-y-2 mb-10 opacity-70 scale-95">
                                {puzzle.categories.filter(c => !solvedGroups.some(s => s.category === c.category)).map((g, i) => (
                                    <div key={i} className={`${levelColors[g.level]} w-full py-4 rounded-xl flex flex-col items-center text-white shadow-sm`}>
                                        <h3 className="font-bold uppercase text-xs tracking-widest">{g.category}</h3>
                                        <p className="text-[10px] font-medium">{g.items.join(', ')}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {gameStatus === 'playing' && (
                            <div className="flex flex-col items-center gap-8">
                                <div className="flex items-center gap-3">
                                    <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Mistakes Remaining</span>
                                    <div className="flex gap-2">
                                        {[...Array(4)].map((_, i) => (
                                            <div key={i} className={`w-3.5 h-3.5 rounded-full shadow-inner transition-colors duration-500 ${i < mistakesRemaining ? 'bg-[#033C5A]' : 'bg-gray-200'}`}></div>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setSelected([])} className="px-6 py-2.5 border-2 border-gray-200 rounded-full text-[10px] font-black uppercase text-gray-500 hover:bg-gray-100 transition-colors">Deselect</button>
                                    <button onClick={() => setPuzzle(p => ({...p, items: [...p.items].sort(() => Math.random() - 0.5)}))} className="px-6 py-2.5 border-2 border-gray-200 rounded-full text-[10px] font-black uppercase text-gray-500 hover:bg-gray-100 transition-colors">Shuffle</button>
                                    <button onClick={handleSubmit} disabled={selected.length !== 4} className={`px-10 py-2.5 rounded-full text-[10px] font-black uppercase shadow-xl transition-all ${selected.length === 4 ? 'bg-[#033C5A] text-white hover:scale-105 active:scale-95' : 'bg-gray-100 text-gray-300'}`}>Submit</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <Modal isOpen={showStats} onClose={() => setShowStats(false)} title="Intelligence Report">
                        <div className="grid grid-cols-4 gap-4 text-center mb-8">
                            <div className="flex flex-col"><span className="text-3xl font-black text-[#033C5A]">{stats.played}</span><span className="text-[9px] uppercase font-bold text-gray-400">Played</span></div>
                            <div className="flex flex-col"><span className="text-3xl font-black text-[#033C5A]">{stats.played ? Math.round((stats.wins/stats.played)*100) : 0}</span><span className="text-[9px] uppercase font-bold text-gray-400">Win %</span></div>
                            <div className="flex flex-col"><span className="text-3xl font-black text-[#033C5A]">{stats.currentStreak}</span><span className="text-[9px] uppercase font-bold text-gray-400">Streak</span></div>
                            <div className="flex flex-col"><span className="text-3xl font-black text-[#033C5A]">{stats.maxStreak}</span><span className="text-[9px] uppercase font-bold text-gray-400">Max</span></div>
                        </div>
                        {gameStatus !== 'playing' && (
                            <button onClick={handleShare} className="w-full py-4 bg-[#033C5A] text-white rounded-xl font-black flex items-center justify-center gap-3 shadow-lg hover:bg-[#022c43] transition-colors">SHARE <ShareIcon /></button>
                        )}
                    </Modal>

                    <Modal isOpen={showHelp} onClose={() => setShowHelp(false)} title="Mission Protocol">
                        <div className="text-sm text-gray-600 space-y-4 font-medium leading-relaxed">
                            <p>Identify four groups of four items that share a George Washington University theme.</p>
                            <p>Each category has a specific difficulty level:</p>
                            <ul className="space-y-2">
                                <li className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-[#AA9868]"></div> <span>Buff (Direct Connections)</span></li>
                                <li className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-[#3C8FC9]"></div> <span>Light Blue (Campus Geography)</span></li>
